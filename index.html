<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal BMN</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}


.login-box{

    width:350px;
    margin:100px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 20px #ccc;

}


input,button{

    width:100%;
    padding:10px;
    margin-top:10px;

}


button{

    background:#1a73e8;
    color:white;
    border:none;
    cursor:pointer;

}


#app{
    display:none;
}


.sidebar{

    width:250px;
    height:100vh;
    background:#222;
    color:white;
    padding:20px;
    float:left;

}


.content{

    margin-left:250px;
    padding:20px;

}


.menu-item{

    padding:10px;
    cursor:pointer;

}


.menu-item:hover{

    background:#444;

}


.folder{

    font-weight:bold;

}


</style>

</head>


<body>


<div id="login" class="login-box">

<h3>Login Portal BMN</h3>


<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">


<button onclick="doLogin()">
Login
</button>


<p id="msg"></p>


</div>



<div id="app">


<div class="sidebar">

<h3>
<i class="fas fa-building"></i>
BMN
</h3>


<div id="menu"></div>


</div>


<div class="content">


<h2>
Selamat Datang Portal BMN
</h2>


<div id="page">

Pilih menu

</div>


</div>


</div>



<script>


const API =
"https://script.google.com/macros/s/AKfycbznG5YgyAdmqi231D3BvBCP72CSQKbCeeJZ0YwH5QEKLMLLgG1WASnAn4sPlFBBG7QX/exec";



let USER_ROLE="";



function doLogin(){


const user =
document.getElementById("user").value;


const pass =
document.getElementById("pass").value;



fetch(
API+
"?action=login&user="+user+"&pass="+pass
)


.then(r=>r.json())


.then(data=>{


if(data.success){


USER_ROLE=data.role;


document.getElementById("login").style.display="none";

document.getElementById("app").style.display="block";


loadMenu();


}

else{


document.getElementById("msg").innerHTML=
"Login gagal";


}


});


}



function loadMenu(){


fetch(API+"?action=menu")


.then(r=>r.json())


.then(data=>{


renderMenu(data);


});


}




function renderMenu(data){


const menu =
document.getElementById("menu");


menu.innerHTML="";



data.forEach(item=>{


if(item.parent_id==""){


let div=document.createElement("div");


div.className="menu-item folder";


div.innerHTML=
`
<i class="${item.icon}"></i>
${item.name}
`;



menu.appendChild(div);


}


});


}



</script>


</body>
</html>
